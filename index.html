<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indochat — Meet Strangers</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #F5A623;
  --gold2: #FFD166;
  --amber: #FF8C00;
  --dark: #080808;
  --dark2: #101010;
  --dark3: #181818;
  --dark4: #222222;
  --white: #FAFAF8;
  --muted: #666;
  --muted2: #444;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body {
  background: var(--dark);
  color: var(--white);
  font-family: 'Cabinet Grotesk', sans-serif;
  overflow-x: hidden;
  cursor: none;
}

/* CUSTOM CURSOR */
.cursor {
  width: 12px; height: 12px;
  background: var(--gold);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  transition: transform 0.1s;
  mix-blend-mode: difference;
}
.cursor-trail {
  width: 36px; height: 36px;
  border: 1px solid rgba(245,166,35,0.4);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 99998;
  transition: all 0.15s ease;
}

/* CANVAS */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.4;
}

/* NAV */
nav {
  position: fixed;
  top: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: rgba(8,8,8,0.7);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 100px;
  width: min(900px, 92vw);
  gap: 24px;
}

.logo {
  font-family: 'Clash Display', sans-serif;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--gold);
  text-decoration: none;
  white-space: nowrap;
}
.logo em { color: var(--white); font-style: normal; }

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}
.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--white); }

.nav-btn {
  background: var(--gold);
  color: var(--dark) !important;
  padding: 9px 20px;
  border-radius: 100px;
  font-weight: 700 !important;
  font-size: 0.82rem !important;
  white-space: nowrap;
  transition: all 0.25s !important;
}
.nav-btn:hover {
  background: var(--gold2) !important;
  transform: scale(1.05);
}

/* SECTIONS BASE */
section { position: relative; z-index: 1; }

/* HERO */
.hero {
  min-height: 100vh;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 140px 6% 80px;
  overflow: hidden;
}

.hero-orb {
  position: absolute;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 65%);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation: breathe 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes breathe {
  0%,100%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.15)}
}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,166,35,0.08);
  border: 1px solid rgba(245,166,35,0.2);
  padding: 7px 16px;
  border-radius: 100px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--gold2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 36px;
  animation: fadeUp 0.8s ease both;
}

.live-dot {
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  box-shadow: 0 0 8px #4ade80;
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.hero h1 {
  font-family: 'Clash Display', sans-serif;
  font-size: clamp(3.2rem, 9vw, 7rem);
  font-weight: 700;
  line-height: 0.95;
  letter-spacing: -3px;
  animation: fadeUp 0.8s ease 0.1s both;
}

.hero h1 .line2 {
  display: block;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-desc {
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: var(--muted);
  margin-top: 28px;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
  font-weight: 400;
  animation: fadeUp 0.8s ease 0.2s both;
}

.hero-ctas {
  display: flex;
  gap: 14px;
  margin-top: 48px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeUp 0.8s ease 0.3s both;
}

.cta-main {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: #000;
  padding: 16px 34px;
  border-radius: 100px;
  font-weight: 800;
  font-size: 0.95rem;
  text-decoration: none;
  font-family: 'Clash Display', sans-serif;
  transition: all 0.3s;
  box-shadow: 0 0 40px rgba(245,166,35,0.3);
}
.cta-main:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 8px 50px rgba(245,166,35,0.5);
}

.cta-ghost {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.04);
  color: var(--white);
  padding: 16px 34px;
  border-radius: 100px;
  font-weight: 500;
  font-size: 0.95rem;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s;
}
.cta-ghost:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(245,166,35,0.4);
  transform: translateY(-3px);
}

.hero-numbers {
  display: flex;
  gap: 0;
  margin-top: 80px;
  animation: fadeUp 0.8s ease 0.4s both;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(10px);
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
}

.num-item {
  flex: 1;
  padding: 28px 20px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.num-item:last-child { border-right: none; }

.num-val {
  font-family: 'Clash Display', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--gold);
}
.num-lbl {
  font-size: 0.73rem;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* MARQUEE */
.marquee-section {
  padding: 40px 0;
  overflow: hidden;
  border-top: 1px solid rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  background: rgba(245,166,35,0.02);
}
.marquee-track {
  display: flex;
  gap: 60px;
  animation: marquee 20s linear infinite;
  white-space: nowrap;
}
.marquee-track span {
  font-family: 'Clash Display', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 3px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.marquee-track span::after {
  content: '✦';
  color: var(--gold);
  font-size: 0.6rem;
}
@keyframes marquee {
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* FEATURES */
.features {
  padding: 120px 6%;
}
.features-inner { max-width: 1200px; margin: 0 auto; }

.section-eyebrow {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.section-h {
  font-family: 'Clash Display', sans-serif;
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1.05;
}

.features-bento {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: auto auto;
  gap: 16px;
  margin-top: 64px;
}

.bento {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.055);
  border-radius: 24px;
  padding: 36px 32px;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}
.bento::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245,166,35,0.3), transparent);
  opacity: 0;
  transition: opacity 0.35s;
}
.bento:hover {
  border-color: rgba(245,166,35,0.15);
  transform: translateY(-6px);
  background: var(--dark3);
}
.bento:hover::before { opacity: 1; }

.bento.large { grid-column: span 2; }
.bento.tall { grid-row: span 2; }

.bento-icon {
  width: 56px; height: 56px;
  background: rgba(245,166,35,0.1);
  border-radius: 16px;
  display: grid;
  place-items: center;
  font-size: 1.6rem;
  margin-bottom: 28px;
}
.bento h3 {
  font-family: 'Clash Display', sans-serif;
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.bento p {
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.75;
}
.bento-tag {
  display: inline-block;
  background: rgba(245,166,35,0.12);
  color: var(--gold2);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 100px;
  margin-top: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* PHONE MOCKUP */
.mockup-section {
  padding: 80px 6% 120px;
  display: flex;
  align-items: center;
  gap: 80px;
  max-width: 1200px;
  margin: 0 auto;
}
.mockup-text { flex: 1; }
.mockup-text .section-h { margin-bottom: 24px; }
.mockup-text p { color: var(--muted); line-height: 1.8; font-size: 0.95rem; margin-bottom: 36px; }

.mockup-phone {
  flex: 0 0 280px;
  position: relative;
}

.phone-wrap {
  width: 260px;
  height: 520px;
  background: var(--dark3);
  border-radius: 40px;
  border: 1.5px solid rgba(255,255,255,0.1);
  padding: 16px;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100%{transform:translateY(0) rotate(-2deg)}
  50%{transform:translateY(-16px) rotate(-2deg)}
}

.phone-screen {
  background: #0D0D0D;
  border-radius: 28px;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.phone-status {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px 8px;
  font-size: 0.6rem;
  color: var(--muted);
}

.phone-chat-header {
  padding: 8px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-avatar {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 0.9rem;
}
.chat-info .chat-name { font-size: 0.75rem; font-weight: 700; }
.chat-info .chat-status { font-size: 0.6rem; color: #4ade80; }

.phone-messages {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}

.msg {
  max-width: 75%;
  padding: 8px 12px;
  border-radius: 14px;
  font-size: 0.65rem;
  line-height: 1.5;
  animation: msgPop 0.3s ease both;
}
@keyframes msgPop {
  from{opacity:0;transform:scale(0.8) translateY(10px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.msg.them {
  background: var(--dark4);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.msg.me {
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: #000;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
  font-weight: 600;
}
.msg-time {
  font-size: 0.5rem;
  color: var(--muted);
  text-align: right;
  margin-top: 4px;
}

.phone-input {
  padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 8px;
}
.phone-input-box {
  flex: 1;
  background: var(--dark4);
  border-radius: 20px;
  padding: 7px 12px;
  font-size: 0.6rem;
  color: var(--muted);
}
.phone-send {
  width: 28px; height: 28px;
  background: var(--gold);
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 0.65rem;
  color: #000;
}

.phone-glow {
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(245,166,35,0.15), transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}

.feature-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.feature-row {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}
.feature-row-icon {
  width: 40px; height: 40px;
  background: rgba(245,166,35,0.08);
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  border: 1px solid rgba(245,166,35,0.12);
}
.feature-row-text h4 {
  font-family: 'Clash Display', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.feature-row-text p {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 0 !important;
}

/* HOW IT WORKS */
.how {
  padding: 120px 6%;
  background: rgba(255,255,255,0.015);
  border-top: 1px solid rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.how-inner { max-width: 1100px; margin: 0 auto; }
.how-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 72px; gap: 40px; flex-wrap: wrap; }
.how-sub { color: var(--muted); max-width: 340px; line-height: 1.7; font-size: 0.9rem; }

.steps-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.06);
  border-radius: 24px;
  overflow: hidden;
}
.step-box {
  background: var(--dark);
  padding: 40px 32px;
  position: relative;
  transition: background 0.3s;
}
.step-box:hover { background: var(--dark2); }

.step-n {
  font-family: 'Clash Display', sans-serif;
  font-size: 4rem;
  font-weight: 700;
  color: rgba(245,166,35,0.08);
  line-height: 1;
  margin-bottom: 24px;
}
.step-icon { font-size: 1.8rem; margin-bottom: 16px; }
.step-box h3 {
  font-family: 'Clash Display', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 10px;
}
.step-box p { color: var(--muted); font-size: 0.82rem; line-height: 1.65; }

/* PRICING */
.pricing {
  padding: 120px 6%;
}
.pricing-inner { max-width: 1100px; margin: 0 auto; }
.pricing-header { text-align: center; margin-bottom: 64px; }
.pricing-header p { color: var(--muted); margin-top: 16px; font-size: 0.95rem; }

.coins-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.coin-card {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 28px;
  padding: 48px 36px;
  text-align: center;
  transition: all 0.35s;
  position: relative;
}
.coin-card.featured {
  background: linear-gradient(145deg, rgba(245,166,35,0.1), var(--dark2));
  border-color: rgba(245,166,35,0.3);
}
.coin-card:hover {
  transform: translateY(-8px);
  border-color: rgba(245,166,35,0.2);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.coin-badge {
  position: absolute;
  top: -13px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: #000;
  font-size: 0.7rem;
  font-weight: 800;
  padding: 5px 16px;
  border-radius: 100px;
  white-space: nowrap;
  font-family: 'Clash Display', sans-serif;
  letter-spacing: 0.5px;
}
.coin-emoji { font-size: 3rem; margin-bottom: 16px; }
.coin-amt {
  font-family: 'Clash Display', sans-serif;
  font-size: 3rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.coin-unit { font-size: 0.78rem; color: var(--muted); margin: 8px 0 28px; text-transform: uppercase; letter-spacing: 1px; }
.coin-price {
  font-family: 'Clash Display', sans-serif;
  font-size: 2rem;
  font-weight: 700;
}
.coin-price span { font-size: 0.85rem; color: var(--muted); font-family: 'Cabinet Grotesk', sans-serif; font-weight: 400; }
.coin-perks {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-align: left;
}
.perk {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  color: var(--muted);
}
.perk::before { content: '✓'; color: var(--gold); font-weight: 700; flex-shrink: 0; }

/* FAQ */
.faq {
  padding: 120px 6%;
  background: rgba(255,255,255,0.015);
  border-top: 1px solid rgba(255,255,255,0.04);
}
.faq-inner { max-width: 760px; margin: 0 auto; }
.faq-header { text-align: center; margin-bottom: 60px; }
.faq-header p { color: var(--muted); margin-top: 16px; }

.faq-items { display: flex; flex-direction: column; gap: 10px; }
.faq-item {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.055);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color 0.3s;
}
.faq-item.open { border-color: rgba(245,166,35,0.2); }

.faq-btn {
  width: 100%;
  background: none;
  border: none;
  color: var(--white);
  padding: 22px 26px;
  font-size: 0.95rem;
  font-weight: 600;
  font-family: 'Clash Display', sans-serif;
  text-align: left;
  cursor: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  letter-spacing: -0.3px;
}
.faq-btn .ico {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(245,166,35,0.1);
  display: grid;
  place-items: center;
  color: var(--gold);
  font-size: 1rem;
  flex-shrink: 0;
  transition: transform 0.3s, background 0.3s;
}
.faq-item.open .ico { transform: rotate(45deg); background: rgba(245,166,35,0.2); }
.faq-ans {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.4s ease;
  color: var(--muted);
  font-size: 0.88rem;
  line-height: 1.8;
  padding: 0 26px;
}
.faq-item.open .faq-ans { max-height: 200px; padding: 0 26px 22px; }

/* CONTACT */
.contact {
  padding: 120px 6%;
  text-align: center;
}
.contact-inner { max-width: 680px; margin: 0 auto; }
.contact-inner .section-h { margin-bottom: 16px; }
.contact-inner > p { color: var(--muted); font-size: 0.95rem; line-height: 1.8; margin-bottom: 40px; }

.contact-card {
  background: var(--dark2);
  border: 1px solid rgba(245,166,35,0.15);
  border-radius: 24px;
  padding: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.contact-icon {
  width: 56px; height: 56px;
  background: rgba(245,166,35,0.1);
  border-radius: 16px;
  display: grid;
  place-items: center;
  font-size: 1.5rem;
}
.contact-info h4 {
  font-family: 'Clash Display', sans-serif;
  font-size: 1rem;
  margin-bottom: 6px;
}
.contact-info a {
  color: var(--gold2);
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 500;
  transition: color 0.2s;
}
.contact-info a:hover { color: var(--gold) }

/* FOOTER */
footer {
  padding: 40px 6%;
  border-top: 1px solid rgba(255,255,255,0.04);
